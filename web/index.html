<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>pdf2calendar</title>
    <style>
      :root {
        /* spacing — 4px base */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-6: 24px;
        --space-8: 32px;
        --space-12: 48px;

        /* type scale */
        --text-xs: 12px;
        --text-sm: 14px;
        --text-base: 16px;
        --text-lg: 20px;
        --text-xl: 28px;

        /* font */
        --font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI",
          Roboto, "Helvetica Neue", Arial, sans-serif;
        --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;

        /* color */
        --bg: #ffffff;
        --bg-muted: #f6f6f6;
        --text: #111111;
        --text-muted: #6b6b6b;
        --border: #e5e5e5;
        --accent: #1a5fb4;
        --accent-fg: #ffffff;
        --warning-bg: #fff8e1;
        --warning-border: #f0c419;
        --error: #b3261e;

        --radius: 4px;
        --focus-ring: 0 0 0 2px var(--accent);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
      }

      body {
        font-family: var(--font-sans);
        font-size: var(--text-base);
        color: var(--text);
        background: var(--bg);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Centered screens: idle, progress, error ───────────────────────── */
      .center-screen {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: var(--space-6);
        /* bias toward optical center (~10% above geometric center) */
        padding-bottom: calc(10vh + var(--space-6));
      }

      /* ── Idle screen ────────────────────────────────────────────────────── */
      .drop-zone {
        display: block;
        width: 100%;
        max-width: 540px;
        border: 2px dashed var(--border);
        border-radius: var(--radius);
        padding: var(--space-12) var(--space-6);
        text-align: center;
        background: var(--bg);
        cursor: pointer;
        transition: background-color 120ms ease-in,
          border-color 120ms ease-in;
      }

      .drop-zone.dragover {
        background: var(--bg-muted);
        border-color: var(--accent);
      }

      .drop-zone:has(:focus-visible),
      .drop-zone.is-focused {
        outline: none;
        box-shadow: var(--focus-ring);
      }

      .drop-zone-main {
        font-size: var(--text-xl);
        font-weight: 500;
        margin-bottom: var(--space-3);
      }

      .drop-zone-secondary {
        font-size: var(--text-sm);
        color: var(--text-muted);
      }

      .sub-label {
        margin-top: var(--space-6);
        font-size: var(--text-sm);
        color: var(--text-muted);
      }

      .inline-error {
        color: var(--error);
        margin-top: var(--space-4);
        font-size: var(--text-sm);
        max-width: 540px;
        text-align: center;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      /* ── Progress screen / spinner ─────────────────────────────────────── */
      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .progress-label {
        margin-top: var(--space-6);
        font-size: var(--text-lg);
        color: var(--text);
        min-height: 1.5em;
        text-align: center;
      }

      @media (prefers-reduced-motion: reduce) {
        .spinner {
          animation: none;
          border-top-color: var(--border);
        }
        .drop-zone {
          transition: none;
        }
      }

      /* ── Success / result page ─────────────────────────────────────────── */
      .success {
        max-width: 800px;
        margin: 0 auto;
        padding: var(--space-8) var(--space-6);
        width: 100%;
      }

      .success-heading {
        font-size: var(--text-xl);
        margin: 0 0 var(--space-6) 0;
        font-weight: 500;
      }

      .banner {
        background: var(--warning-bg);
        border: 1px solid var(--warning-border);
        border-radius: var(--radius);
        padding: var(--space-4);
        padding-right: 56px;
        margin-bottom: var(--space-6);
        position: relative;
      }

      .banner-error {
        background: #fdecea;
        border-color: var(--error);
        color: var(--error);
      }

      .banner-error .banner-codes {
        background: rgba(179, 38, 30, 0.08);
      }

      .banner h2 {
        margin: 0 0 var(--space-2) 0;
        font-size: var(--text-lg);
        font-weight: 500;
      }

      .banner-body {
        font-size: var(--text-sm);
      }

      .banner-codes {
        font-family: var(--font-mono);
        background: rgba(0, 0, 0, 0.04);
        padding: 0 4px;
        border-radius: 2px;
      }

      .banner-dismiss {
        position: absolute;
        top: var(--space-2);
        right: var(--space-2);
        background: transparent;
        border: 0;
        cursor: pointer;
        font-size: var(--text-lg);
        min-width: 44px;
        min-height: 44px;
        line-height: 1;
        color: var(--text-muted);
        border-radius: var(--radius);
      }

      .role-group {
        margin-bottom: var(--space-6);
      }

      .role-caption {
        font-size: var(--text-xs);
        color: var(--text-muted);
        margin-bottom: var(--space-2);
        font-weight: 500;
      }

      .person-row {
        display: grid;
        grid-template-columns: 1fr auto auto auto;
        grid-template-rows: auto auto;
        grid-template-areas:
          "name preview copy google"
          "fallback fallback fallback fallback";
        align-items: center;
        column-gap: var(--space-3);
        row-gap: var(--space-1);
        padding: var(--space-3) 0;
        border-bottom: 1px solid var(--border);
      }

      .person-name {
        grid-area: name;
        font-size: var(--text-base);
        font-weight: 500;
      }

      .preview-btn {
        grid-area: preview;
      }

      .copy-btn {
        grid-area: copy;
        min-width: 110px;
      }

      .google-link {
        grid-area: google;
      }

      .row-fallback {
        grid-area: fallback;
        font-size: var(--text-xs);
        color: var(--text-muted);
        display: none;
      }

      .person-row:hover .row-fallback,
      .person-row:focus-within .row-fallback {
        display: block;
      }

      .btn {
        font-family: inherit;
        font-size: var(--text-sm);
        padding: 8px 14px;
        min-height: 44px;
        border-radius: var(--radius);
        cursor: pointer;
        border: 1px solid transparent;
        background: transparent;
        color: var(--text);
      }

      .btn:focus-visible {
        outline: none;
        box-shadow: var(--focus-ring);
      }

      .btn-primary {
        background: var(--accent);
        color: var(--accent-fg);
        border-color: var(--accent);
        font-weight: 500;
      }

      .btn-primary:hover {
        filter: brightness(0.95);
      }

      .btn-quiet {
        color: var(--text-muted);
        text-decoration: underline;
        padding: 8px;
      }

      .btn-link {
        color: var(--accent);
        text-decoration: underline;
        padding: 8px;
        display: inline-flex;
        align-items: center;
        min-height: 44px;
      }

      .re-upload {
        margin-top: var(--space-8);
        text-align: center;
      }

      .re-upload-btn {
        color: var(--text-muted);
        text-decoration: underline;
      }

      /* ── Lightbox ──────────────────────────────────────────────────────── */
      .lightbox-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        align-items: flex-start;
        justify-content: center;
        z-index: 1000;
        padding: var(--space-4);
        overflow: auto;
      }

      .lightbox-stack {
        display: flex;
        flex-direction: column;
        gap: var(--space-4);
        max-width: 95vw;
        margin: auto;
      }

      .lightbox-fig {
        margin: 0;
        background: var(--bg);
        border-radius: var(--radius);
        padding: var(--space-3);
      }

      .lightbox-img {
        display: block;
        max-width: 100%;
        max-height: 80vh;
        background: var(--bg);
        margin: 0 auto;
      }

      .lightbox-caption {
        margin-top: var(--space-2);
        font-size: var(--text-xs);
        color: var(--text-muted);
        text-align: center;
      }

      .lightbox-close {
        position: fixed;
        top: var(--space-3);
        right: var(--space-3);
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        min-width: 44px;
        min-height: 44px;
        font-size: var(--text-lg);
        cursor: pointer;
        line-height: 1;
      }

      /* ── Modal (auth prompt + confirm overwrite) ───────────────────────── */
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 900;
        padding: var(--space-4);
      }

      .modal-card {
        background: var(--bg);
        border-radius: var(--radius);
        padding: var(--space-6);
        max-width: 480px;
        width: 100%;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      }

      .modal-card h2 {
        margin: 0 0 var(--space-3) 0;
        font-size: var(--text-lg);
        font-weight: 500;
      }

      .modal-body {
        margin: 0 0 var(--space-4) 0;
        font-size: var(--text-sm);
      }

      .modal-form {
        display: flex;
        flex-direction: column;
        gap: var(--space-3);
      }

      .modal-label {
        font-size: var(--text-sm);
        font-weight: 500;
      }

      .modal-input {
        font-family: inherit;
        font-size: var(--text-base);
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        min-height: 44px;
      }

      .modal-input:focus-visible {
        outline: none;
        box-shadow: var(--focus-ring);
      }

      .modal-error {
        color: var(--error);
        background: #fdecea;
        border: 1px solid var(--error);
        border-radius: var(--radius);
        padding: var(--space-2) var(--space-3);
        font-size: var(--text-sm);
        margin-bottom: var(--space-3);
      }

      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: var(--space-3);
        margin-top: var(--space-3);
      }

      /* ── Landing page ──────────────────────────────────────────────────── */
      .landing-screen {
        max-width: 800px;
        margin: 0 auto;
        padding: var(--space-8) var(--space-6);
        width: 100%;
      }

      .landing-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: var(--space-3);
        margin-bottom: var(--space-6);
        flex-wrap: wrap;
      }

      .landing-title {
        font-size: var(--text-xl);
        font-weight: 500;
        margin: 0;
      }

      .latest-plan-caption {
        font-size: var(--text-sm);
        color: var(--text-muted);
        margin: 0 0 var(--space-6) 0;
      }

      .landing-skeleton {
        font-size: var(--text-sm);
        color: var(--text-muted);
        padding: var(--space-6) 0;
        text-align: center;
      }

      .landing-error {
        text-align: center;
        padding: var(--space-6) 0;
      }

      .landing-empty {
        text-align: center;
        padding: var(--space-8) 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: var(--space-3);
      }

      .landing-empty-msg {
        font-size: var(--text-lg);
        color: var(--text-muted);
        margin: 0;
      }

      .drop-cancel-row {
        margin-top: var(--space-4);
      }

      /* ── Error screen ──────────────────────────────────────────────────── */
      .error-screen h1 {
        font-size: var(--text-xl);
        margin: 0 0 var(--space-4) 0;
        font-weight: 500;
        text-align: center;
      }
      .error-screen p {
        margin: 0 0 var(--space-2) 0;
        max-width: 540px;
        text-align: center;
      }
      .error-action {
        font-size: var(--text-sm);
        color: var(--text-muted);
      }
      .try-again {
        margin-top: var(--space-6);
      }

      /* ── Mobile ────────────────────────────────────────────────────────── */
      @media (max-width: 640px) {
        .person-row {
          grid-template-columns: 1fr auto;
          grid-template-rows: auto auto auto;
          grid-template-areas:
            "name preview"
            "copy google"
            "fallback fallback";
        }
        .row-fallback {
          display: block;
        }
        .copy-btn {
          justify-self: start;
        }
        .google-link {
          justify-self: end;
        }
        .lightbox-img {
          max-width: 100vw;
          max-height: 100vh;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
